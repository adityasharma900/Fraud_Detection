services:
  mongo:
    image: mongo:7.0
    container_name: fraud_mongo
    ports:
      - "27017:27017"
    # Bound the WiredTiger cache so benchmark numbers are comparable run-to-run.
    command: ["--wiredTigerCacheSizeGB", "2"]
    volumes:
      - ./.mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: a lightweight admin UI at http://localhost:8081
  mongo-express:
    image: mongo-express:1.0.2
    container_name: fraud_mongo_express
    depends_on: [mongo]
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: "false"
    profiles: ["ui"]   # enable with: docker compose --profile ui up -d
